site_name: Chuscraper Documentation
site_url: https://github.com/ToufiqQureshi/chuscraper
repo_url: https://github.com/ToufiqQureshi/chuscraper
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - content.code.copy
    - property.og.title
    - property.og.description
    - navigation.expand
    - navigation.indexes
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
    - Your First Scraper: first_script.md
  - Core Concepts:
    - Browser & Tab: core_concepts.md
    - Selectors & Locators: selectors.md
    - Interactions: interactions.md
    - Waiting Strategies: waiting.md
  - Advanced Features:
    - Network & Proxy: network.md
    - Stealth & Anti-Detect: stealth.md
    - AI & Vision: ai_features.md
    - CDP Protocol: advanced_cdp.md
    - Async & Patterns: async_patterns.md
  - Examples:
    - Real World Examples: REAL_WORLD_EXAMPLES.md
    - Stealth Proof: STEALTH_PROOF.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
