<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#1e1e1e" />
  
  <!-- Abstract Spider / C Shape -->
  <path d="M 100,50 
           C 130,50 150,70 150,100 
           C 150,130 130,150 100,150 
           L 100,130 
           C 115,130 130,120 130,100 
           C 130,80 115,70 100,70 
           L 100,50 Z" 
        fill="url(#grad1)" filter="url(#glow)" />
  
  <!-- Digital Nodes / Legs -->
  <circle cx="100" cy="50" r="5" fill="#00d2ff" />
  <circle cx="100" cy="150" r="5" fill="#00d2ff" />
  
  <line x1="150" y1="100" x2="175" y2="100" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" stroke-dasharray="2,2" />
  <line x1="100" y1="50" x2="100" y2="25" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" />
  <line x1="100" y1="150" x2="100" y2="175" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" />
  
  <!-- Neural Link Inner -->
  <circle cx="90" cy="100" r="8" fill="#00d2ff" opacity="0.8" />
  <path d="M 85,100 L 95,100 M 90,95 L 90,105" stroke="#1e1e1e" stroke-width="2" />
  
</svg>
