<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Transparent Logo for Chuscraper -->
  <defs>
    <linearGradient id="spiderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Geometric Spider Body (Central 'C') -->
  <g filter="url(#neonGlow)">
    <path d="M 240,140 
             A 60,60 0 1 0 240,260" 
          fill="none" 
          stroke="url(#spiderGrad)" 
          stroke-width="12" 
          stroke-linecap="round" />
    
    <!-- Nodes on 'C' -->
    <circle cx="240" cy="140" r="6" fill="#00ffcc" />
    <circle cx="240" cy="260" r="6" fill="#00ffcc" />
    <circle cx="140" cy="200" r="8" fill="#00ffcc" />
    
    <!-- Connectivity Lines -->
    <line x1="140" y1="200" x2="110" y2="200" stroke="#00ffcc" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Spider Legs (Geometric Neon Style) -->
  <g stroke="url(#spiderGrad)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#neonGlow)">
    <!-- Top Left Legs -->
    <path d="M 160,160 L 120,120 L 80,140" />
    <path d="M 180,140 L 150,90 L 110,80" />
    
    <!-- Top Right Legs -->
    <path d="M 240,160 L 280,120 L 320,140" />
    <path d="M 220,140 L 250,90 L 290,80" />
    
    <!-- Bottom Left Legs -->
    <path d="M 160,240 L 120,280 L 80,260" />
    <path d="M 180,260 L 150,310 L 110,320" />
    
    <!-- Bottom Right Legs -->
    <path d="M 240,240 L 280,280 L 320,260" />
    <path d="M 220,260 L 250,310 L 290,320" />
  </g>
  
  <!-- Central Neural Core -->
  <circle cx="190" cy="200" r="15" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0.5" />
  <circle cx="190" cy="200" r="5" fill="#00ffcc" />
</svg>
